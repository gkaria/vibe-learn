# vibe-learn hooks for Codex CLI
# INSTALL_DIR_PLACEHOLDER is replaced with the actual install path during installation.
#
# NOTE: Codex reports shell commands as Bash and file edits through apply_patch.
# observe.sh normalizes both into vibe-learn's session-log schema.

[features]
codex_hooks = true

[hooks]

[[hooks.SessionStart]]
[[hooks.SessionStart.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/bootstrap.sh"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/capture-prompt.sh"

[[hooks.PostToolUse]]
matcher = "^(Bash|apply_patch)$"
[[hooks.PostToolUse.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/observe.sh"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/pause-summary.sh"
