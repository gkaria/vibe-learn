# vibe-learn hooks for Codex CLI
# INSTALL_DIR_PLACEHOLDER is replaced with the actual install path during installation.
#
# NOTE: Codex reports shell commands as Bash and file edits through apply_patch.
# Edit and Write are documented matcher aliases; hook input still reports
# tool_name = "apply_patch", which observe.sh normalizes into session-log entries.

[features]
hooks = true

[hooks]

[[hooks.SessionStart]]
[[hooks.SessionStart.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/bootstrap.sh"
timeout = 5
statusMessage = "Preparing vibe-learn session context"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/capture-prompt.sh"
timeout = 5
statusMessage = "Capturing vibe-learn prompt context"

[[hooks.PostToolUse]]
matcher = "^(Bash|apply_patch|Edit|Write)$"
[[hooks.PostToolUse.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/observe.sh"
timeout = 2
statusMessage = "Recording vibe-learn tool activity"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/pause-summary.sh"
timeout = 10
statusMessage = "Writing vibe-learn pause summary"
