# vibe-learn hooks for Codex CLI
# INSTALL_DIR_PLACEHOLDER is replaced with the actual install path during installation.
#
# NOTE: Codex currently fires PostToolUse reliably for Bash tool calls only.
# File edit hooks (Write/Edit via apply_patch) do not fire in most Codex versions.
# Session logs will capture bash commands; file write/edit events require Codex
# to add apply_patch PostToolUse support in a future release.

[features]
codex_hooks = true

[hooks]

[[hooks.SessionStart]]
[[hooks.SessionStart.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/bootstrap.sh"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/capture-prompt.sh"

[[hooks.PostToolUse]]
matcher = "^Bash$"
[[hooks.PostToolUse.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/observe.sh"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "INSTALL_DIR_PLACEHOLDER/scripts/pause-summary.sh"
