name: Release

on:
  push:
    tags: ['v*.*.*']
  # Manual re-sync: rewrite an existing release's notes from the current
  # CHANGELOG.md section (e.g. after improving the notes post-release).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag whose release notes should be synced from CHANGELOG.md (e.g. v0.7.0)"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats and jq
        run: sudo apt-get install -y bats jq

      - name: Run tests
        run: bats tests/

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          # Extract the section between this version header and the next
          NOTES=$(awk "/^## \[${VERSION_NUM}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Write to file to avoid quoting issues
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release edit "$TAG" --repo "${{ github.repository }}" \
              --notes-file /tmp/release-notes.md
          else
            # --verify-tag: fail if the git tag doesn't exist, so a mistyped
            # workflow_dispatch input can't mint a new tag/release from main.
            gh release create "$TAG" --repo "${{ github.repository }}" \
              --verify-tag \
              --title "$TAG" \
              --notes-file /tmp/release-notes.md
          fi
