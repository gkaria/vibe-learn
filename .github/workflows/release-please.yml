name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: googleapis/release-please-action@v4
        # No release-type here — manifest mode reads release-please-config.json,
        # which sets release-type: simple (manages VERSION) + extra-files for setup.sh
